# LiveKit Egress config for local development
# Connects to local LiveKit at ws://localhost:7880
# Redis and Minio are from docker compose

api_key: devkey
api_secret: secret

ws_url: ws://host.docker.internal:7880

insecure: true

redis:
  address: redis:6379
  db: 0

logging:
  json: false
  level: debug

template_port: 7980
prometheus_port: 0
health_port: 0
debug_handler_port: 0

storage:
  s3:
    endpoint: http://minio:9000
    access_key: minioadmin
    secret: minioadmin
    bucket: livekit-recordings
    region: us-east-1
    forcePathStyle: true
    max_retries: 3
    min_retry_delay: 500ms
    max_retry_delay: 5s

session_limits:
  file_output_max_duration: 3h
  stream_output_max_duration: 90m
  segment_output_max_duration: 3h

debug:
  enable_profiling: false
