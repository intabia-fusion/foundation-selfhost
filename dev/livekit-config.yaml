# LiveKit development server configuration
# Used by run-livekit.sh for local development

port: 7880

webhook:
  urls: ['http://127.0.0.1:8096/webhook']
  api_key: whkey

redis:
  address: 127.0.0.1:6379
  db: 0

turn:
  enabled: false

rtc:
  udp_port: 7882
  tcp_port: 7881
  use_external_ip: false
  enable_loopback_candidate: false

keys:
  devkey: secret
  devkey2: secret2
  whkey: whsecret

logging:
  json: false
  level: debug
