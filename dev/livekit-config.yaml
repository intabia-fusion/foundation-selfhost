# LiveKit development server configuration
# NOTE: This is a reference template. Actual config is generated by setup.sh --dev
# into config/livekit.yaml with real credentials.

port: 7880

webhook:
  urls: ['http://127.0.0.1:8097/webhook']
  api_key: GENERATED_KEY

redis:
  address: 127.0.0.1:6379
  db: 0

turn:
  enabled: false

rtc:
  udp_port: 7882
  tcp_port: 7881
  use_external_ip: false
  enable_loopback_candidate: false

keys:
  GENERATED_KEY: GENERATED_SECRET

logging:
  json: false
  level: debug
