name: ${DOCKER_NAME}
services:
  nginx:
    image: 'nginx:1.21.3'
    ports:
      - '${HTTP_BIND}:${HTTP_PORT}:80'
    volumes:
      - ./.platform.nginx:/etc/nginx/conf.d/default.conf
      - ./config/certs:/etc/platform/certs:ro
    restart: unless-stopped
    links:
      - account
      - transactor
      - front
      - stats
    networks:
      - platform_net

  postgres:
    image: postgres:18.1
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - ${VOLUME_POSTGRES_DATA_PATH:-postgres_data}:/var/lib/postgresql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - platform_net

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v25.2.11
    command:
      - redpanda
      - start
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr internal://redpanda:8082,external://localhost:18082
      - --schema-registry-addr internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --rpc-addr redpanda:33145
      - --advertise-rpc-addr redpanda:33145
      - --smp 1
      - --default-log-level=info
    volumes:
      - ${VOLUME_REDPANDA_PATH:-redpanda}:/var/lib/redpanda/data
    environment:
      - REDPANDA_SUPERUSER_USERNAME=${REDPANDA_ADMIN_USER}
      - REDPANDA_SUPERUSER_PASSWORD=${REDPANDA_ADMIN_PWD}
    healthcheck:
      test:
        [
          'CMD',
          'rpk',
          'cluster',
          'info',
          '-X',
          'user=${REDPANDA_ADMIN_USER}',
          '-X',
          'pass=${REDPANDA_ADMIN_PWD}',
        ]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - platform_net

  minio:
    image: 'minio/minio'
    command: server /data --address ":9000" --console-address ":9001"
    volumes:
      - ${VOLUME_FILES_PATH:-files}:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - platform_net

  elastic:
    image: 'elasticsearch:8.19.1'
    command: |
      /bin/sh -c "./bin/elasticsearch-plugin list | grep -q ingest-attachment || yes | ./bin/elasticsearch-plugin install --silent ingest-attachment;
      ./bin/elasticsearch-plugin list | grep -q analysis-icu || yes | ./bin/elasticsearch-plugin install --silent analysis-icu;
      /usr/local/bin/docker-entrypoint.sh eswrapper"
    volumes:
      - ${VOLUME_ELASTIC_PATH:-elastic}:/usr/share/elasticsearch/data
    environment:
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - ELASTICSEARCH_PORT_NUMBER=9200
      - BITNAMI_DEBUG=true
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms1024m -Xmx1024m
      - http.cors.enabled=true
      - http.cors.allow-origin=http://localhost:8082
    healthcheck:
      interval: 20s
      retries: 10
      test: curl -s http://localhost:9200/_cluster/health | grep -vq '"status":"red"'
    restart: unless-stopped
    networks:
      - platform_net

  rekoni:
    image: intabiafusion/rekoni-service:${PLATFORM_VERSION}
    environment:
      - SECRET=${SECRET}
    deploy:
      resources:
        limits:
          memory: 500M
    restart: unless-stopped
    networks:
      - platform_net

  transactor:
    image: intabiafusion/transactor:${PLATFORM_VERSION}
    depends_on:
      account:
        condition: service_started
    volumes:
      - ./config/branding.json:/var/cfg/branding.json:ro
      - ./config/region-config.yaml:/var/cfg/region-config.yaml:ro
    environment:
      - BRANDING_PATH=/var/cfg/branding.json
      - REGION_CONFIG=/var/cfg/region-config.yaml
      - SERVER_PORT=3333
      - SERVER_SECRET=${SECRET}
      - DB_URL=${CR_DB_URL}
      - STORAGE_CONFIG=${STORAGE_CONFIG}
      - FRONT_URL=http://localhost:8087
      - ACCOUNTS_URL=http://account:3000
      - FULLTEXT_URL=http://fulltext:4700
      - STATS_URL=http://stats:4900
      - LAST_NAME_FIRST=${LAST_NAME_FIRST:-true}
      - QUEUE_CONFIG=redpanda:9092
      - AI_BOT_URL=http://aibot:4011
      - MAIL_URL=http://mail_server:8097
      - MAIL_AUTH_TOKEN=main_secret
    restart: unless-stopped
    networks:
      - platform_net

  collaborator:
    image: intabiafusion/collaborator:${PLATFORM_VERSION}
    environment:
      - COLLABORATOR_PORT=3078
      - SECRET=${SECRET}
      - ACCOUNTS_URL=http://account:3000
      - STATS_URL=http://stats:4900
      - STORAGE_CONFIG=${STORAGE_CONFIG}
    restart: unless-stopped
    networks:
      - platform_net

  account:
    image: intabiafusion/account:${PLATFORM_VERSION}
    links:
      - postgres
    volumes:
      - ./config/branding.json:/var/cfg/branding.json:ro
      - ./config/region-config.yaml:/var/cfg/region-config.yaml:ro
    environment:
      - BRANDING_PATH=/var/cfg/branding.json
      - REGION_CONFIG=/var/cfg/region-config.yaml
      - SERVER_PORT=3000
      - SERVER_SECRET=${SECRET}
      - ADMIN_EMAILS=${PLATFORM_ADMIN_EMAILS}
      - DB_URL=${CR_DB_URL}
      - TRANSACTOR_URL=ws://transactor:3333;ws${SECURE:+s}://${HOST_ADDRESS}/_transactor
      - STORAGE_CONFIG=${STORAGE_CONFIG}
      - FRONT_URL=http${SECURE:+s}://${HOST_ADDRESS}
      - STATS_URL=http://stats:4900
      - STATS_API=http${SECURE:+s}://${HOST_ADDRESS}/_stats
      - MODEL_ENABLED=*
      - ACCOUNTS_URL=http${SECURE:+s}://${HOST_ADDRESS}/_accounts
      - ACCOUNT_PORT=3000
      - QUEUE_CONFIG=redpanda:9092
      - MAIL_URL=http://mail_server:8097
    restart: unless-stopped
    networks:
      - platform_net

  workspace:
    image: intabiafusion/workspace:${PLATFORM_VERSION}
    volumes:
      - ./config/branding.json:/var/cfg/branding.json:ro
    environment:
      - BRANDING_PATH=/var/cfg/branding.json
      - SERVER_SECRET=${SECRET}
      - DB_URL=${CR_DB_URL}
      - TRANSACTOR_URL=ws://transactor:3333;ws${SECURE:+s}://${HOST_ADDRESS}/_transactor
      - STORAGE_CONFIG=${STORAGE_CONFIG}
      - MODEL_ENABLED=*
      - ACCOUNTS_URL=http://account:3000
      - STATS_URL=http://stats:4900
      - QUEUE_CONFIG=redpanda:9092
      - ACCOUNTS_DB_URL=${CR_DB_URL}
      - MAIL_URL=http://mail_server:8097
    restart: unless-stopped
    networks:
      - platform_net

  front:
    image: intabiafusion/front:${PLATFORM_VERSION}
    volumes:
      - ./config/branding.json:/app/dist/branding.json:ro
    environment:
      - BRANDING_URL=http${SECURE:+s}://${HOST_ADDRESS}/branding.json
      - SERVER_PORT=8080
      - SERVER_SECRET=${SECRET}
      - LOVE_ENDPOINT=http${SECURE:+s}://${HOST_ADDRESS}/_love
      - ACCOUNTS_URL=http${SECURE:+s}://${HOST_ADDRESS}/_accounts
      - ACCOUNTS_URL_INTERNAL=http://account:3000
      - REKONI_URL=http${SECURE:+s}://${HOST_ADDRESS}/_rekoni
      - CALENDAR_URL=http${SECURE:+s}://${HOST_ADDRESS}/_calendar
      - GMAIL_URL=http${SECURE:+s}://${HOST_ADDRESS}/_gmail
      - TELEGRAM_URL=http${SECURE:+s}://${HOST_ADDRESS}/_telegram
      - STATS_URL=http://stats:4900
      - STATS_API=http${SECURE:+s}://${HOST_ADDRESS}/_stats
      - UPLOAD_URL=/files
      - ELASTIC_URL=http://elastic:9200
      - COLLABORATOR_URL=ws${SECURE:+s}://${HOST_ADDRESS}/_collaborator
      - STORAGE_CONFIG=${STORAGE_CONFIG}
      - TITLE=${TITLE:-Platform Self Host}
      - DEFAULT_LANGUAGE=${DEFAULT_LANGUAGE:-ru}
      - LAST_NAME_FIRST=${LAST_NAME_FIRST:-true}
      - DESKTOP_UPDATES_CHANNEL=${DESKTOP_CHANNEL}
      - DESKTOP_UPDATES_URL=http${SECURE:+s}://${HOST_ADDRESS}/_dist
      - STREAM_URL=http${SECURE:+s}://${HOST_ADDRESS}/_stream/recording
      - PREVIEW_URL=http${SECURE:+s}://${HOST_ADDRESS}/_preview
      - DATALAKE_URL=http${SECURE:+s}://${HOST_ADDRESS}/_datalake
      - FILES_URL=http${SECURE:+s}://${HOST_ADDRESS}/_datalake/blob/:workspace/:blobId/:filename
      - LIVEKIT_WS=${LIVEKIT_HOST}
      - PUSH_PUBLIC_KEY=${PUSH_PUBLIC_KEY:-}
      - AI_URL=http${SECURE:+s}://${HOST_ADDRESS}/_ai
      - BILLING_URL=http${SECURE:+s}://${HOST_ADDRESS}/_billing
      - MAIL_URL=http://mail_server:8097
    restart: unless-stopped
    networks:
      - platform_net
  datalake:
    image: intabiafusion/datalake:${PLATFORM_VERSION}
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    depends_on:
      minio:
        condition: service_healthy
      postgres:
        condition: service_started
      stats:
        condition: service_started
      account:
        condition: service_started
    ports:
      - 4031:4031
    environment:
      - PORT=4031
      - SECRET=${SECRET}
      - ACCOUNTS_URL=http://account:3000
      - STATS_URL=http://stats:4900
      - DB_URL=${CR_DB_URL}
      - BUCKETS=blobs,eu|http://minio:9000?accessKey=minioadmin&secretKey=minioadmin
      - QUEUE_CONFIG=redpanda:9092
      # - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4318/v1/traces
    restart: unless-stopped
    networks:
      - platform_net
  fulltext:
    image: intabiafusion/fulltext:${PLATFORM_VERSION}
    environment:
      - SERVER_SECRET=${SECRET}
      - DB_URL=${CR_DB_URL}
      - FULLTEXT_DB_URL=http://elastic:9200
      - ELASTIC_INDEX_NAME=platform_storage_index
      - STORAGE_CONFIG=${STORAGE_CONFIG}
      - REKONI_URL=http://rekoni:4004
      - ACCOUNTS_URL=http://account:3000
      - STATS_URL=http://stats:4900
      - QUEUE_CONFIG=redpanda:9092
    restart: unless-stopped
    networks:
      - platform_net

  stats:
    image: intabiafusion/stats:${PLATFORM_VERSION}
    environment:
      - PORT=4900
      - SERVER_SECRET=${SECRET}
    restart: unless-stopped
    networks:
      - platform_net

  rating:
    image: intabiafusion/rating:${PLATFORM_VERSION}
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    links:
      - postgres
      - minio
      - account
      - stats
    depends_on:
      redpanda:
        condition: service_started
    environment:
      - QUEUE_CONFIG=redpanda:9092
      - SERVER_SECRET=${SECRET}
      - STATS_URL=http://stats:4900
      - DB_URL=${CR_DB_URL}
      - STORAGE_CONFIG=${STORAGE_CONFIG}
      - ACCOUNTS_URL=http://account:3000
      - COMMUNICATION_TIME_LOGGING_ENABLED=true
      - COMMUNICATION_API_ENABLED=false
    restart: unless-stopped
    networks:
      - platform_net
  redis:
    image: redis:8.0.2-alpine3.21
    ports:
      - 6379:6379
    restart: unless-stopped
    networks:
      - platform_net
  process-service:
    image: intabiafusion/process:${PLATFORM_VERSION}
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    depends_on:
      redpanda:
        condition: service_started
      account:
        condition: service_started
    environment:
      - SECRET=secret
      - ACCOUNTS_URL=http://account:3000
      - QUEUE_CONFIG=redpanda:9092
    restart: unless-stopped
    networks:
      - platform_net

  stream:
    image: 'intabiafusion/stream:${PLATFORM_VERSION}'
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    environment:
      #      - STREAM_ENDPOINT_URL=s3://minio
      - STREAM_ENDPOINT_URL=datalake://datalake:4031
      - STREAM_INSECURE=true
      - STREAM_SERVER_SECRET=${SECRET}
      - STREAM_SERVE_URL=0.0.0.0:1081
      - STREAM_BASE_URL=http${SECURE:+s}://${HOST_ADDRESS}/_stream
      - STREAM_MAX_PARALLEL_SCALING_COUNT=2
      - STREAM_LOG_LEVEL=debug
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin
      - STREAM_QUEUE_CONFIG=redpanda:9092
    ports:
      - 1081:1081
    restart: unless-stopped
    networks:
      - platform_net
  media:
    image: 'intabiafusion/media:${PLATFORM_VERSION}'
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    environment:
      - ACCOUNTS_URL=http://account:3000
      - SECRET=${SECRET}
      - QUEUE_CONFIG=redpanda:9092
    restart: unless-stopped
    networks:
      - platform_net
  preview:
    image: 'intabiafusion/preview:${PLATFORM_VERSION}'
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    environment:
      - SECRET=${SECRET}
      - STORAGE_CONFIG=${STORAGE_CONFIG}
      - CACHE_PATH=/data/cache
      - PORT=4043
    ports:
      - 4043:4043
    restart: unless-stopped
    networks:
      - platform_net

  love:
    image: intabiafusion/love:${PLATFORM_VERSION}
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    environment:
      - PORT=8097
      - SECRET=${SECRET}
      - ACCOUNTS_URL=http://account:3000
      - DB_URL=${CR_DB_URL}
      - STORAGE_CONFIG=${STORAGE_CONFIG}
      - S3_STORAGE_CONFIG=s3|http://minio:9000?accessKey=minioadmin&secretKey=minioadmin&rootBucket=love-recordings
      - QUEUE_CONFIG=redpanda:9092
      - QUEUE_REGION=
      - STATS_URL=http://stats:4900
      - LIVEKIT_HOST=ws://host.docker.internal:7880
      - LIVEKIT_API_KEY=${LIVEKIT_API_KEY}
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET}
      - LIVEKIT_WEBHOOK_API_KEY=${LIVEKIT_API_KEY}
      - LIVEKIT_WEBHOOK_API_SECRET=${LIVEKIT_API_SECRET}
      - LIVEKIT_PROJECT='self_prj'
      - BILLING_URL=http://billing:4042
      - BILLING_POLL_INTERVAL=15
      - AGENTS=transcribe
      - WEBHOOK_URL=http://127.0.0.1:8097/webhook
      - POLLING_ENABLED=true
      - POLLING_INTERVAL_MS=30000
      - PENDING_JOIN_TIMEOUT_MS=60000
    ports:
      - 8097:8097
    restart: unless-stopped
    networks:
      - platform_net

  aibot:
    image: intabiafusion/ai-bot:${PLATFORM_VERSION}
    ports:
      - 4011:4011
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    restart: unless-stopped
    links:
      - account
      - transactor
    environment:
      - PORT=4011
      - SERVER_SECRET=${SECRET}
      - QUEUE_CONFIG=redpanda:9092
      - ACCOUNTS_URL=http://account:3000
      - STORAGE_CONFIG=${STORAGE_CONFIG}
      - CHUNK_STORAGE_CONFIG=minio|minio?accessKey=minioadmin&secretKey=minioadmin&rootBucket=chunks
      - FIRST_NAME=Юля
      - LAST_NAME=AI
      - PASSWORD=password
      - AVATAR_PATH=./avatar.png
      - AVATAR_CONTENT_TYPE=.png
      - STATS_URL=http://stats:4900
      - LOVE_ENDPOINT=http://love:8097
      - BILLING_URL=http://billing:4042
      - LLM_PROVIDER=${LLM_PROVIDER:-server} # gigachat
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_SUMMARY_MODEL=${OPENAI_SUMMARY_MODEL}
      - OPENAI_TRANSLATE_MODEL=${OPENAI_TRANSLATE_MODEL}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL}
      - STT_PROVIDER=${STT_PROVIDER:-server}
      - STT_URL=${STT_URL}
      - STT_API_KEY=${STT_API_KEY}
      - STT_MODEL=${STT_MODEL}
    networks:
      - platform_net

  love-agent:
    image: intabiafusion/love-agent:${PLATFORM_VERSION}
    profiles:
      - livekit
      - livekit-dev
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    depends_on:
      - love
      - aibot
    environment:
      - SERVER_SECRET=${SECRET}
      - PLATFORM_URL=http://aibot:4011
      - LIVEKIT_URL=ws://host.docker.internal:7880
      - LIVEKIT_API_KEY=${LIVEKIT_API_KEY}
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET}
      - STT_PROVIDER=${LOVE_AGENT_STT_PROVIDER:-stream}
      - AGENT_NAME=transcribe
    restart: unless-stopped
    networks:
      - platform_net

  billing:
    image: intabiafusion/billing:${PLATFORM_VERSION}
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    depends_on:
      postgres:
        condition: service_healthy
      account:
        condition: service_started
      datalake:
        condition: service_started
    ports:
      - 4042:4042
    environment:
      - PORT=4042
      - SECRET=${SECRET}
      - ACCOUNTS_URL=http://account:3000
      - DB_URL=${CR_DB_URL}
      - STORAGE_CONFIG=${STORAGE_CONFIG}
      - USAGE_UPDATE_INTERVAL=3600
    restart: unless-stopped
    networks:
      - platform_net

  # desktop-dist:
  #   image: intabiafusion/desktop-distro:${PLATFORM_VERSION}
  #   platform: linux/amd64
  #   extra_hosts:
  #     - 'host.docker.internal:host-gateway'
  #   ports:
  #     - 4409:4409
  #   environment:
  #     - PORT=4409
  #   restart: unless-stopped
  #   networks:
  #     - platform_net

  notifications:
    image: intabiafusion/notifications:${PLATFORM_VERSION}
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    depends_on:
      redpanda:
        condition: service_started
      account:
        condition: service_started
      transactor:
        condition: service_started
    environment:
      - SECRET=${SECRET}
      - ACCOUNTS_URL=http://account:3000
      - DB_URL=${CR_DB_URL}
      - STORAGE_CONFIG=${STORAGE_CONFIG}
      - QUEUE_CONFIG=redpanda:9092
      - QUEUE_REGION=
      - STATS_URL=http://stats:4900
    restart: unless-stopped
    networks:
      - platform_net

  livekit:
    image: livekit/livekit-server:latest
    profiles:
      - livekit
    command: --config /etc/livekit.yaml
    depends_on:
      redis:
        condition: service_started
    restart: unless-stopped
    # ports:
    #   - 7880:7880/tcp
    #   - 7881:7881/tcp
    #   - 5349:5349/tcp
    #   - 5349:5349/udp
    #   - 3478:3478/tcp
    #   - 3478:3478/udp
    # - '50000-60000:50000-60000/udp'
    network_mode: 'host'
    volumes:
      - ./config/livekit.yaml:/etc/livekit.yaml
      - ./config/certs:/etc/livekit/certs:ro

  mail_server:
    image: intabiafusion/mail:${PLATFORM_VERSION}
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    depends_on:
      - mailpit
    environment:
      - MODE=queue
      - SOURCE=hello@localhost
      - REPLY_TO=hello@localhost
      - QUEUE_CONFIG=redpanda:9092
      - PORT=8077
      - REGION=
      - API_KEY=main_secret
      - SMTP_HOST=mailpit
      - SMTP_USERNAME=platform
      - SMTP_PASSWORD=platform
      - SMTP_PORT=1025
      - SMTP_TLS_MODE=ignore
      - SMTP_ALLOW_SELF_SIGNED=true
    restart: unless-stopped
    networks:
      - platform_net


  mailpit:
    image: axllent/mailpit
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    restart: unless-stopped
    volumes:
      - ${VOLUME_MAILPIT_PATH:-mailpit}:/data
    ports:
      - ${MAILPIT_HTTP_PORT:-8025}:8025
      - 1025:1025
    environment:
      MP_MAX_MESSAGES: 5000
      MP_DATABASE: /data/mailpit.db
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
    networks:
      - platform_net

  # Additional services
  print:
    image: intabiafusion/print:${PLATFORM_VERSION}
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    restart: unless-stopped
    environment:
      - SECRET=${SECRET}
      - REGION=
      - QUEUE_CONFIG=redpanda:9092
      - STORAGE_CONFIG=${STORAGE_CONFIG}
      - STATS_URL=http://stats:4900
      - ACCOUNTS_URL=http://account:3000
    networks:
      - platform_net

  analytics:
    image: intabiafusion/analytics-collector:${PLATFORM_VERSION}
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    restart: unless-stopped
    environment:
      - SECRET=${SECRET}
      - PORT=4017
      - SERVICE_ID=analytics-collector-service
      - ACCOUNTS_URL=http://account:3000
      - STATS_URL=http://stats:4900
    networks:
      - platform_net

  export:
    image: intabiafusion/export:${PLATFORM_VERSION}
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    links:
      - minio
      - stats
    environment:
      - PORT=4009
      - SECRET=${SECRET}
      - SERVICE_ID=export-service
      - DB_URL=${CR_DB_URL}
      - STATS_URL=http://stats:4900
      - STORAGE_CONFIG=${STORAGE_CONFIG}
      - ACCOUNTS_URL=http://account:3000
    restart: unless-stopped
    networks:
      - platform_net

  time-machine:
    image: intabiafusion/worker:${PLATFORM_VERSION}
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    depends_on:
      redpanda:
        condition: service_started
      account:
        condition: service_started
      postgres:
        condition: service_started
    environment:
      - DB_URL=${CR_DB_URL}
      - QUEUE_CONFIG=redpanda:9092
      - QUEUE_REGION=
    restart: unless-stopped
    networks:
      - platform_net

  livekit-egress:
    image: livekit/egress:latest
    profiles:
      - livekit
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    volumes:
      - ./config/livekit-egress-config.yaml:/out/config.yaml:ro
    environment:
      - EGRESS_CONFIG_FILE=/out/config.yaml
    depends_on:
      - redis
      - minio
    restart: unless-stopped
    networks:
      - platform_net

  link-preview:
    image: intabiafusion/link-preview:${PLATFORM_VERSION}
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    environment:
      - SECRET=${SECRET}
      - PORT=4042
    restart: unless-stopped
    networks:
      - platform_net

  activity:
    image: intabiafusion/activity:${PLATFORM_VERSION}
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    depends_on:
      redpanda:
        condition: service_started
      account:
        condition: service_started
      postgres:
        condition: service_started
      transactor:
        condition: service_started
    volumes:
      - ./config/branding.json:/var/cfg/branding.json:ro
    environment:
      - SECRET=${SECRET}
      - ACCOUNTS_URL=http://account:3000
      - QUEUE_CONFIG=redpanda:9092
      - QUEUE_REGION=
      - DB_URL=${CR_DB_URL}
      - STORAGE_CONFIG=${STORAGE_CONFIG}
      - APPLY_TX_BATCH_SIZE=100
      - BRANDING_PATH=/var/cfg/branding.json
    restart: unless-stopped
    networks:
      - platform_net

  notification:
    image: intabiafusion/notification:${PLATFORM_VERSION}
    environment:
      - PORT=3335
      - SOURCE=mail@example.com
      - ACCESS_KEY=none
      - SECRET_KEY=none
      - PUSH_PUBLIC_KEY=${PUSH_PUBLIC_KEY:-}
      - PUSH_PRIVATE_KEY=${PUSH_PRIVATE_KEY:-}
    restart: unless-stopped
    networks:
      - platform_net
  oaitt:
    image: intabiafusion/oaitt:v1.0.0
    environment:
      - PORT=9007
      - ASR_ENGINE=gigaam
      - DEVICE=cpu
      - GIGAAM_MODEL=v3_e2e_ctc
    restart: unless-stopped
    networks:
      - platform_net

volumes:
  # These named volumes are used when custom volume paths are not specified
  # If VOLUME_*_PATH variables are set, these volumes will be ignored
  elastic:
  files:
  postgres_data:
  redpanda:
  mailpit:

networks:
  platform_net:
